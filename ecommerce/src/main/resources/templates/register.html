<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
<p class="heading">Registration form for users</p><hr>
<div class="form">
    <form th:action="@{/user/register}" th:object="${user}" method="post">

        <div class="name">
            <label for="name">Username: </label>
            <input type="text" id="name" th:field="*{name}">
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div class="email">
            <label for="email">E-Mail: </label>
            <input type="email" id="email" th:field="*{email}">
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="mobile">
            <label for="mobile">Mobile Number: </label>
            <input type="text" id="mobile" th:field="*{mobile}">
            <span th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></span>
        </div>

        <div class="password">
            <label for="password">Password: </label>
            <input type="password" id="password" th:field="*{password}">
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <button type="submit">Register</button>
    </form>

</div>
</body>
</html>
